name: Secret Scan

# Server-side safety net mirroring the local pre-commit guard: catches any secret
# pushed to GitHub, including commits made with --no-verify. Runs on every push and
# pull request so a leak fails CI before it can be merged or deployed.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans the full commit range, not just the tip

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE needed for personal (non-organization) repositories.
